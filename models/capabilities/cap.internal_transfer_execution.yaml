id: cap.internal_transfer_execution
name: Internal Transfer Execution
domain_id: domain.payments
description: >
  Execute fund movements between accounts held within the same institution, including
  intrabank account-to-account transfers, loan payments from deposit accounts, and
  inter-product sweeps, with real-time or same-day posting and immediate balance reflection.
