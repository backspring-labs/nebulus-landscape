id: cap.financial_crime_program_governance_and_testing
name: Financial Crime Program Governance & Testing
domain_id: domain.risk_fraud
description: >
  Govern, oversee, and test the institution's financial crime compliance program
  including BSA/AML, fraud, and sanctions programs through independent testing,
  model validation, regulatory change management, training administration, and
  program effectiveness assessment to ensure ongoing regulatory compliance and
  program adequacy.
value_stream_ids:
  - vs.regulatory_compliance
  - vs.risk_management
