id: cap.payment_return_reversal_and_recall_management
name: Payment Return, Reversal, and Recall Management
domain_id: domain.payments
description: >
  Process and manage the return, reversal, and recall of payments across all payment rails,
  including originating and receiving institution workflows, reason code management, regulatory
  deadline compliance, customer and counterparty communication, and the corresponding accounting
  and ledger adjustments.
