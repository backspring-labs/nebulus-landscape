id: cap.payment_exception_and_repair_management
name: Payment Exception and Repair Management
domain_id: domain.payments
description: >
  Identify, queue, triage, and resolve payment exceptions that prevent straight-through processing,
  including data quality issues, validation failures, routing errors, and processing anomalies,
  enabling operations teams to repair and resubmit payments while maintaining audit trails and
  meeting processing deadlines.
value_stream_ids:
  - vs.payment_execution
  - vs.operational_efficiency
  - vs.regulatory_compliance
  - vs.customer_self_service
journey_ids:
