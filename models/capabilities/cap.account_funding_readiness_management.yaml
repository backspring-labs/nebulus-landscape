  - journey.open_checking_account
  - journey.fund_new_account
  - journey.release_account_for_use
  - journey.resolve_account_opening_exception
process_ids:
  - proc.account_opening_v1
  - proc.initial_funding_readiness_evaluation
  - proc.account_activation_preparation
  - proc.account_opening_exception_resolution
risk_ids:
