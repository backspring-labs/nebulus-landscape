  - risk.unexplained_funding_block
  - risk.funding_readiness_state_divergence
  - risk.readiness_vs_payment_execution_confusion
  - risk.inconsistent_opening_constraint_reflection
control_ids:
  - ctrl.funding_readiness_prerequisite_matrix
  - ctrl.account_usability_state_reconciliation
