id: cap.regulatory_information_sharing_and_law_enforcement_response
name: Regulatory Information Sharing & Law Enforcement Response
domain_id: domain.risk_fraud
description: >
  Manage the institution's participation in regulatory information-sharing programs
  and respond to law enforcement requests, including 314(a) and 314(b) program
  participation, subpoena and court order processing, and coordination with regulatory
  and law enforcement agencies on financial crime matters.
