id: cap.payment_fee_and_pricing_application
name: Payment Fee and Pricing Application
domain_id: domain.payments
description: >
  Calculate, apply, and manage fees and pricing for payment transactions based on payment type,
  rail, customer segment, relationship pricing, and contractual terms, ensuring accurate fee
  assessment, transparent disclosure, and proper revenue recognition across the payment lifecycle.
