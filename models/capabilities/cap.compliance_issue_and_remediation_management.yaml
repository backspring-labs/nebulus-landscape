id: cap.compliance_issue_and_remediation_management
name: Compliance Issue & Remediation Management
domain_id: domain.risk_fraud
description: >
  Identify, track, escalate, and remediate compliance issues, deficiencies, and
  findings arising from internal testing, regulatory examinations, audits, and
  self-identified gaps across the financial crime compliance program, ensuring
  timely resolution and sustainable corrective action.
value_stream_ids:
