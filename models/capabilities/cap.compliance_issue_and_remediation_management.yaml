  - proc.issue_severity_assessment_and_prioritization
  - proc.root_cause_analysis_and_documentation
  - proc.remediation_plan_development_and_approval
  - proc.remediation_execution_and_milestone_tracking
  - proc.remediation_validation_and_effectiveness_testing
  - proc.issue_closure_and_documentation
  - proc.regulatory_commitment_and_mra_tracking
risk_ids:
