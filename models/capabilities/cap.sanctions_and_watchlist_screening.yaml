id: cap.sanctions_and_watchlist_screening
name: Sanctions & Watchlist Screening
domain_id: domain.risk_fraud
description: >
  Screen customers, counterparties, transactions, and related entities against
  sanctions lists, PEP databases, adverse media sources, and regulatory watchlists
  to identify prohibited or high-risk associations and enable timely interdiction
  or escalation.
