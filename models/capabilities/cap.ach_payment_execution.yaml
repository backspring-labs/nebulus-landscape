id: cap.ach_payment_execution
name: ACH Payment Execution
domain_id: domain.payments
description: >
  Execute outbound and inbound ACH payment instructions through the Automated Clearing House
  network, including origination, file generation, transmission, return and exception handling,
  and settlement coordination for both credit and debit transactions.
value_stream_ids:
  - vs.payment_execution
  - vs.operational_efficiency
  - vs.revenue_generation
  - vs.regulatory_compliance
journey_ids:
  - journey.customer_ach_payment
