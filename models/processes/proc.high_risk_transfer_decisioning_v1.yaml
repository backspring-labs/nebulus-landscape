id: proc.high_risk_transfer_decisioning_v1
name: High-Risk Transfer Decisioning v1
journey_id: journey.approve_or_decline_high_risk_transfer
description: >
  Operational process for intercepting, evaluating, and decisioning payments
  and transfers flagged as high-risk by fraud scoring, sanctions screening, or
  transaction monitoring rules, from real-time intercept through approval,
  decline, or investigative hold.
stage_ids:
  - stage.high_risk_transfer.transfer_intercept_and_risk_flag
