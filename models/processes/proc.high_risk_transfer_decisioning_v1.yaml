  - stage.high_risk_transfer.analyst_review_and_decision
  - stage.high_risk_transfer.decision_execution_and_release
  - stage.high_risk_transfer.post_decision_monitoring_and_feedback
  - stage.high_risk_transfer.exception_escalation_and_override
risk_ids:
  - risk.false_decline_customer_impact
  - risk.approved_fraudulent_transfer
  - risk.sanctions_evasion_through_structuring
  - risk.decision_latency_exceeding_sla
  - risk.override_without_authorization
  - risk.incomplete_risk_context_at_decision
  - risk.feedback_loop_degradation
control_ids:
