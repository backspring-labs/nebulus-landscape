id: journey.close_financial_period
name: Close Financial Period
description: >
  A reporting period (month-end, quarter-end, or year-end) is closed by
  completing all outstanding postings, finalizing accruals and
  assessments, executing reconciliation controls, producing period-close
  evidence, rolling forward balances, and locking the closed period
  against further posting — establishing the authoritative financial
  record for downstream reporting and regulatory production.
