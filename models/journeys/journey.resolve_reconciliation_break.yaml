id: journey.resolve_reconciliation_break
name: Resolve Reconciliation Break
description: >
  A reconciliation break — a discrepancy between subledger positions,
  operational source records, settlement positions, or general ledger
  accounts — is detected, investigated, attributed to a root cause,
  and resolved through corrective action such as adjustment, reposting,
  reclassification, or suspense clearance, restoring agreement between
  books.
actor: operations_analyst
entry_capability_id: cap.financial_reconciliation_management
