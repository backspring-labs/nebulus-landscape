id: journey.send_instant_payment
name: Send Instant Payment
description: >
  Customer initiates a real-time payment through an instant payment rail
  (e.g., RTP or FedNow), with payee resolution, fraud and risk screening,
  irrevocability controls, real-time clearing and settlement, and immediate
  confirmation to both sender and receiver.
