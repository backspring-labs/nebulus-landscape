id: journey.transfer_between_own_accounts
name: Transfer Between Own Accounts
description: >
  Customer initiates and completes a fund transfer between two accounts they own
  at the same institution, with validation of account eligibility, balance
  sufficiency, applicable limits, and real-time or near-real-time posting to
  both the source and destination accounts.
